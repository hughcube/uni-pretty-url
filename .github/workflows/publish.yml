name: CI & Publish

on:
  push:
    branches: ['main']
    tags: ['v*']
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22, 24, 26]
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test:coverage
      - run: pnpm build

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write          # 回写版本号到 main
      id-token: write          # OIDC 发布 + provenance
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      - name: Set version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Trusted Publishing (OIDC) 需 npm >= 11.5.1
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest
      # 无 NODE_AUTH_TOKEN：npm 用 GitHub OIDC token 换取短时发布凭证
      - run: npm publish --provenance --access public
      - name: Write version back
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main FETCH_HEAD
          npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
          git add package.json pnpm-lock.yaml
          git diff --staged --quiet || git commit -m "chore: release ${GITHUB_REF_NAME} [skip ci]"
          git push origin main
